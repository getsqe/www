name: Deploy getsqe.com

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize per ref: main pushes queue behind each other; PR runs stay isolated
# and never block a production deploy.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Runs on every push AND every PR — this is the merge gate.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Official Astro action: detects the package manager, runs the build,
      # and uploads the Pages artifact (from ./dist) in one step.
      - name: Build with Astro
        uses: withastro/action@v6
        with:
          node-version: 22
      # Blocking publish-safety gate. Runs after the build; if it fails, the
      # deploy job (needs: build) is skipped, so nothing leaked reaches Pages.
      - name: Leak-scan the built output (blocking gate)
        run: bash scripts/leak-scan.sh dist

  # Deploy only on push to main / manual dispatch — never on PRs.
  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
